name: Darwinbox API Rate Limits
description: >-
  Darwinbox does not publish explicit rate limits in its public API
  documentation. The API is request-only and accessible to privileged users.
  Darwinbox publishes API enhancements on a monthly basis. Implementers are
  advised to handle rate-limiting responses gracefully and implement appropriate
  retry logic with exponential backoff.
url: https://api-docs.darwinbox.com/
created: '2026-06-13'
modified: '2026-06-13'
rateLimits:
  - name: General API Rate Limit
    description: >-
      Darwinbox does not publicly document specific rate limit thresholds.
      Rate limits may be enforced at the server level. Contact the Darwinbox
      integration team at integrationsteam@darwinbox.in for rate limit
      specifics relevant to your integration.
    documented: false
    contact: integrationsteam@darwinbox.in
authentication:
  type: Token-based (SHA512)
  description: >-
    Authentication uses a token generated by SHA512 hashing of the concatenated
    admin email, unique secret key (provided by Darwinbox), and current 10-digit
    epoch timestamp. The API supports Basic Auth or OAuth 2.0 depending on
    configuration.
  methods:
    - name: Token-based (SHA512)
      description: >-
        Concatenate admin email ID + unique secret key + current epoch timestamp
        (10 digits), then SHA512 hash the result to generate the auth token.
      required_params:
        - Admin email ID
        - Unique secret key (provided by Darwinbox)
        - Current 10-digit epoch timestamp
    - name: Basic Auth
      description: Standard HTTP Basic Authentication
    - name: OAuth 2.0
      description: OAuth 2.0 authentication flow, configurable based on preference
recommendations:
  - Implement error handling for HTTP 429 (Too Many Requests) responses
  - Use exponential backoff for retry logic
  - Contact integrationsteam@darwinbox.in for rate limit details specific to your account
  - API access is provided on a request-only basis to privileged users
