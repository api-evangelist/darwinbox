aid: darwinbox
name: Darwinbox
description: >-
  Darwinbox is a cloud-based HRMS platform offering a REST API for managing
  employee records, recruitment, performance, payroll, attendance, travel, and
  workforce analytics in enterprise organizations. The API supports programmatic
  access to data stored in Darwinbox instances and enables importing data into
  the platform. Access is provided on a request-only basis to privileged users
  and supports token-based authentication using SHA512 hashing.
