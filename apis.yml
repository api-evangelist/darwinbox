apis:
  - aid: darwinbox:darwinbox-api
    name: Darwinbox API
    description: >-
      REST API for Darwinbox HRMS covering employee management, attendance,
      recruitment, organizational management, payroll, background verification,
      project management, and travel. Authentication uses token-based SHA512
      hashing with admin email, secret key, and epoch timestamp. API access is
      request-only and available to privileged users.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
